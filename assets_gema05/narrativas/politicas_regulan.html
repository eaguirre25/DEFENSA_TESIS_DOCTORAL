<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>¿Cómo las políticas regulan las prácticas de dirección escolar?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap');

  :root{
    --bg0:#04101f;
    --bg1:#0a1d39;
    --bg2:#123864;
    --cyan:#63ebff;
    --cyan2:#7fdcff;
    --blue:#2e90e8;
    --teal:#66e0d4;
    --violet:#91a7ff;
    --text:#f4f8ff;
    --soft:#dceaff;
    --muted:#9fb6dd;
    --line:rgba(255,255,255,.12);
    --glow:0 0 20px rgba(99,235,255,.22);
  }

  *{box-sizing:border-box}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:'Rajdhani','Segoe UI',sans-serif;
    color:var(--text);
  }

  #viewport{
    position:fixed;
    inset:0;
    display:grid;
    place-items:center;
    background:#000;
  }

  .slide{
    position:relative;
    width:min(100vw, calc(100vh * 16 / 9));
    height:min(100vh, calc(100vw * 9 / 16));
    overflow:hidden;
    background:
      radial-gradient(circle at 12% 18%, rgba(99,235,255,.14), transparent 22%),
      radial-gradient(circle at 82% 15%, rgba(127,220,255,.10), transparent 20%),
      radial-gradient(circle at 80% 84%, rgba(102,224,212,.08), transparent 22%),
      linear-gradient(145deg, var(--bg0), var(--bg1) 48%, var(--bg2));
    box-shadow:0 0 0 1px rgba(255,255,255,.05), 0 28px 90px rgba(0,0,0,.55);
  }

  .slide::before{
    content:"";
    position:absolute;
    inset:-12%;
    background-image:
      linear-gradient(55deg, transparent 0 48%, rgba(99,235,255,.18) 49%, transparent 50%),
      linear-gradient(125deg, transparent 0 48%, rgba(255,255,255,.05) 49%, transparent 50%),
      radial-gradient(circle, rgba(255,255,255,.45) 0 1px, transparent 2px);
    background-size:20% 20%, 24% 24%, 4.4% 4.4%;
    transform:rotate(-7deg);
    opacity:.24;
    animation:gridDrift 18s linear infinite alternate;
    pointer-events:none;
  }

  .spark-layer,
  .spark-layer::before,
  .spark-layer::after{
    position:absolute;
    inset:0;
    content:"";
    pointer-events:none;
  }

  .spark-layer{
    opacity:.55;
    mix-blend-mode:screen;
  }

  .spark-layer::before{
    inset:-8%;
    background:
      radial-gradient(circle at 7% 18%, rgba(255,255,255,.18) 0 1px, transparent 2px),
      radial-gradient(circle at 14% 68%, rgba(255,255,255,.16) 0 1.2px, transparent 2px),
      radial-gradient(circle at 23% 33%, rgba(255,255,255,.15) 0 1px, transparent 1.8px),
      radial-gradient(circle at 38% 81%, rgba(255,255,255,.12) 0 1px, transparent 1.8px),
      radial-gradient(circle at 48% 28%, rgba(255,255,255,.18) 0 1px, transparent 2px),
      radial-gradient(circle at 57% 57%, rgba(255,255,255,.15) 0 1px, transparent 2px),
      radial-gradient(circle at 69% 14%, rgba(255,255,255,.14) 0 1px, transparent 1.8px),
      radial-gradient(circle at 76% 74%, rgba(255,255,255,.15) 0 1px, transparent 1.8px),
      radial-gradient(circle at 88% 41%, rgba(255,255,255,.17) 0 1px, transparent 1.8px),
      radial-gradient(circle at 94% 84%, rgba(255,255,255,.14) 0 1px, transparent 1.8px);
    animation:sparkDriftA 17s linear infinite alternate;
    filter:blur(.2px);
  }

  .spark-layer::after{
    inset:-10%;
    background:
      radial-gradient(circle at 11% 79%, rgba(255,255,255,.12) 0 1px, transparent 1.8px),
      radial-gradient(circle at 28% 11%, rgba(255,255,255,.17) 0 1px, transparent 1.8px),
      radial-gradient(circle at 34% 59%, rgba(255,255,255,.15) 0 1px, transparent 1.8px),
      radial-gradient(circle at 44% 38%, rgba(255,255,255,.14) 0 1px, transparent 1.8px),
      radial-gradient(circle at 53% 87%, rgba(255,255,255,.14) 0 1px, transparent 1.8px),
      radial-gradient(circle at 66% 48%, rgba(255,255,255,.18) 0 1px, transparent 1.8px),
      radial-gradient(circle at 73% 24%, rgba(255,255,255,.13) 0 1px, transparent 1.8px),
      radial-gradient(circle at 82% 67%, rgba(255,255,255,.16) 0 1px, transparent 1.8px),
      radial-gradient(circle at 91% 17%, rgba(255,255,255,.16) 0 1px, transparent 1.8px);
    animation:sparkDriftB 22s linear infinite alternate;
    opacity:.8;
  }

  .content{
    position:absolute;
    inset:3.1% 3.4% 3.1% 3.4%;
    display:grid;
    grid-template-rows:auto auto 1fr auto;
    gap:1.2%;
    z-index:3;
  }

  .eyebrow{
    display:flex;
    align-items:center;
    gap:.8em;
    color:var(--muted);
    font-size:clamp(10px, .88vw, 16px);
    letter-spacing:.18em;
    text-transform:uppercase;
    font-weight:700;
  }
  .eyebrow::before{
    content:"";
    width:3.2em;
    height:.16em;
    border-radius:999px;
    background:linear-gradient(90deg,var(--cyan),var(--blue));
    box-shadow:var(--glow);
  }

  .title{
    margin:0;
    font-size:clamp(22px, 1.55vw, 32px);
    line-height:1.04;
    font-weight:700;
    letter-spacing:.01em;
    color:#eef7ff;
    text-transform:none;
    text-shadow:0 0 16px rgba(99,235,255,.12);
  }

  .columns-wrap{
    position:relative;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:1.25%;
    min-height:0;
    align-items:stretch;
  }

  .col{
    position:relative;
    min-height:100%;
    border-radius:1.7vw;
    border:1px solid rgba(255,255,255,.14);
    background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
    box-shadow:0 26px 70px rgba(0,0,0,.26), inset 0 0 26px rgba(255,255,255,.02);
    overflow:hidden;
    padding:8.5% 7% 8.5%;
    opacity:0;
    transform:translateY(28px) scale(.98);
    pointer-events:none;
  }

  .col.visible{
    animation:colIn .85s cubic-bezier(.2,.75,.2,1) forwards;
    pointer-events:auto;
  }

  .col::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      linear-gradient(180deg, rgba(5,10,22,.14), rgba(5,10,22,.12)),
      linear-gradient(115deg, transparent 0 54%, rgba(255,255,255,.05) 62%, transparent 72%);
    animation:sheenMove 7.5s ease-in-out infinite;
    pointer-events:none;
  }

  .col::after{
    content:"";
    position:absolute;
    left:0;
    top:0;
    bottom:0;
    width:5px;
    border-radius:999px;
    box-shadow:0 0 22px rgba(255,255,255,.18);
  }

  .col.walsh{
    background:
      radial-gradient(circle at 18% 18%, rgba(121,243,255,.24), transparent 28%),
      linear-gradient(160deg, rgba(35,170,255,.22), rgba(16,87,170,.13) 56%, rgba(255,255,255,.03));
  }
  .col.walsh::after{background:linear-gradient(180deg, #7ce7ff, #2d93e8)}

  .col.pizarnik{
    background:
      radial-gradient(circle at 82% 18%, rgba(255,154,210,.20), transparent 28%),
      linear-gradient(160deg, rgba(187,92,255,.18), rgba(119,58,187,.12) 56%, rgba(255,255,255,.03));
  }
  .col.pizarnik::after{background:linear-gradient(180deg, #ff9dd8, #a44dff)}

  .col.galeano{
    background:
      radial-gradient(circle at 18% 82%, rgba(126,245,201,.20), transparent 26%),
      linear-gradient(160deg, rgba(42,205,151,.18), rgba(24,127,111,.12) 56%, rgba(255,255,255,.03));
  }
  .col.galeano::after{background:linear-gradient(180deg, #8af3d1, #27b48a)}

  .col.active{
    box-shadow:0 28px 86px rgba(0,0,0,.32), 0 0 28px rgba(99,235,255,.14), inset 0 0 30px rgba(255,255,255,.04);
    border-color:rgba(255,255,255,.22);
  }

  .col{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    isolation:isolate;
  }

  .watermark{
    position:absolute;
    inset:5% 4% 6% 4%;
    background-position:center center;
    background-repeat:no-repeat;
    background-size:84% auto;
    opacity:.18;
    filter:grayscale(100%) contrast(1.08) brightness(1.02);
    mix-blend-mode:screen;
    z-index:0;
    pointer-events:none;
  }

  .watermark::after{
    content:"";
    position:absolute;
    inset:-5% -4%;
    background:linear-gradient(180deg, rgba(4,16,31,.10), rgba(4,16,31,.18));
  }

  .col .micro,
  .col .big{position:relative; z-index:1;}

  .col .micro{
    font-size:clamp(24px, 1.72vw, 34px);
    font-weight:700;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:#d9ecff;
    margin-bottom:6.2%;
  }

  .col .big{
    font-size:clamp(46px, 3.45vw, 78px);
    line-height:1.02;
    font-weight:700;
    color:#fff;
    letter-spacing:-.03em;
    text-shadow:0 0 18px rgba(255,255,255,.06);
    max-width:92%;
  }


  .controls{
    justify-self:end;
    align-self:end;
    display:flex;
    align-items:center;
    gap:.65vw;
    color:rgba(255,255,255,.76);
    font-size:clamp(10px, .82vw, 15px);
    text-transform:uppercase;
    letter-spacing:.08em;
    font-weight:600;
  }

  .controls kbd,
  .arrow-btn{
    font:inherit;
    font-weight:700;
    color:#fff;
    background:linear-gradient(90deg, rgba(255,255,255,.10), rgba(99,235,255,.14));
    border:1px solid rgba(255,255,255,.16);
    border-radius:.55em;
    padding:.2em .5em;
    box-shadow:0 0 14px rgba(99,235,255,.10);
  }

  .next-btn{
    position:absolute;
    right:3.3%;
    bottom:4.1%;
    z-index:8;
    width:58px;
    height:58px;
    border-radius:50%;
    display:grid;
    place-items:center;
    border:1px solid rgba(255,255,255,.18);
    background:radial-gradient(circle at 35% 30%, rgba(99,235,255,.28), rgba(255,255,255,.08));
    color:#fff;
    font-size:28px;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 0 22px rgba(99,235,255,.18), inset 0 0 20px rgba(99,235,255,.12);
    transition:transform .22s ease, box-shadow .22s ease, opacity .22s ease;
  }
  .next-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 30px rgba(99,235,255,.24), inset 0 0 22px rgba(99,235,255,.15);
  }
  .next-btn.hidden{opacity:0; pointer-events:none}

  .story-modal{
    position:absolute;
    inset:4.3% 4.6%;
    z-index:20;
    display:none;
    align-items:center;
    justify-content:center;
  }
  .story-modal.open{display:flex}

  .story-backdrop{
    position:absolute;
    inset:0;
    border-radius:2vw;
    background:rgba(5, 10, 22, .78);
    border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(14px);
    box-shadow:0 28px 90px rgba(0,0,0,.45), inset 0 0 36px rgba(99,235,255,.05);
  }

  .story-card{
    position:relative;
    width:93%;
    height:89%;
    max-height:none;
    border-radius:1.9vw;
    border:1px solid rgba(255,255,255,.16);
    background:
      radial-gradient(circle at 14% 12%, rgba(99,235,255,.11), transparent 24%),
      linear-gradient(160deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
    box-shadow:0 28px 86px rgba(0,0,0,.42), 0 0 28px rgba(99,235,255,.10);
    padding:2.2% 2.7% 2%;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }

  .story-card.pizarnik{
    background:
      radial-gradient(circle at 82% 14%, rgba(154,180,255,.11), transparent 24%),
      linear-gradient(160deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
  }

  .story-card.galeano{
    background:
      radial-gradient(circle at 16% 86%, rgba(102,224,212,.10), transparent 24%),
      linear-gradient(160deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
  }

  .story-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:1.2em;
    margin-bottom:1.1%;
  }

  .story-kicker{
    font-size:clamp(13px, 1vw, 18px);
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.15em;
    color:#d4e9ff;
    margin-bottom:.4em;
  }

  .story-title{
    font-size:clamp(30px, 2.3vw, 48px);
    line-height:.95;
    letter-spacing:-.03em;
    font-weight:700;
    color:#fff;
    margin:0;
  }

  .story-body{
    white-space:pre-line;
    font-size:clamp(28px, 2vw, 38px);
    line-height:1.1;
    color:#f7fbff;
    font-weight:500;
  }

  .story-cite{
    margin-top:1.1%;
    font-size:clamp(16px, 1.04vw, 21px);
    line-height:1.12;
    color:#d6e8ff;
    font-weight:500;
  }


  .story-text-wrap{
    flex:1 1 auto;
    min-height:0;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
  }

  .story-main{
    flex:1 1 auto;
    min-height:0;
    display:grid;
    grid-template-columns:minmax(0,1fr) minmax(280px,34%);
    gap:2.2%;
    align-items:stretch;
  }
  .story-media{
    display:none;
    min-width:0;
    margin:0;
    padding:1.2%;
    border:1px solid rgba(116,232,255,.3);
    border-radius:1vw;
    background:rgba(4,12,24,.68);
    box-shadow:0 0 24px rgba(80,220,255,.14);
    overflow:hidden;
    grid-template-rows:minmax(0,1fr) auto;
    gap:8px;
  }
  .story-media.visible{display:grid}
  .story-media img{width:200%;max-width:none;height:100%;min-height:0;object-fit:fill;object-position:left center;border-radius:.7vw;background:rgba(255,255,255,.035)}
  .story-media figcaption{font-size:clamp(11px,.76vw,15px);line-height:1.15;color:#d6e8f3;text-align:center;font-weight:500}

  .back-btn{
    border:1px solid rgba(255,255,255,.18);
    background:linear-gradient(90deg, rgba(255,255,255,.08), rgba(99,235,255,.12));
    color:#fff;
    border-radius:999px;
    padding:.5em .9em;
    font-family:inherit;
    font-size:clamp(12px, .96vw, 18px);
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
    cursor:pointer;
    box-shadow:0 0 18px rgba(99,235,255,.12);
  }

  .exitOverlay{
    position:fixed;
    inset:0;
    z-index:999;
    display:grid;
    place-items:center;
    background:#02040b;
    color:#fff;
    opacity:0;
    pointer-events:none;
    transition:opacity .28s ease;
  }
  .exitOverlay .box{
    text-align:center;
    font-size:clamp(24px, 2.2vw, 42px);
    font-weight:700;
    letter-spacing:-.03em;
  }
  .exitOverlay small{
    display:block;
    margin-top:12px;
    color:var(--muted);
    font-size:clamp(12px, .9vw, 17px);
    letter-spacing:.08em;
    text-transform:uppercase;
  }
  .exited .exitOverlay{opacity:1; pointer-events:auto}

  @keyframes gridDrift{
    from{transform:rotate(-7deg) translate3d(-1vw,-.8vw,0)}
    to{transform:rotate(-7deg) translate3d(1.2vw,1vw,0)}
  }

  @keyframes sparkDriftA{
    from{transform:translate3d(-1.5%, -1.4%, 0) scale(1); opacity:.38}
    to{transform:translate3d(1.6%, 1.4%, 0) scale(1.03); opacity:.62}
  }

  @keyframes sparkDriftB{
    from{transform:translate3d(1.4%, -1.1%, 0) scale(1.01); opacity:.34}
    to{transform:translate3d(-1.8%, 1.5%, 0) scale(1.02); opacity:.54}
  }

  @keyframes sheenMove{
    0%,100%{transform:translateX(-14%)}
    50%{transform:translateX(14%)}
  }

  @keyframes colIn{
    0%{opacity:0; transform:translateY(28px) scale(.98); filter:blur(3px)}
    100%{opacity:1; transform:translateY(0) scale(1); filter:blur(0)}
  }

  @media (max-aspect-ratio: 16/9){.slide{width:100vw; height:calc(100vw * 9 / 16)}}
  @media (min-aspect-ratio: 16/9){.slide{width:calc(100vh * 16 / 9); height:100vh}}
</style>
</head>
<body>
<div id="viewport">
  <main class="slide">
    <div class="spark-layer" aria-hidden="true"></div>

    <section class="content">
      <div class="eyebrow">Narrativas de la multirregulación</div>

      <h1 class="title">¿cómo las políticas regulan las prácticas de dirección escolar?</h1>

      <div class="columns-wrap" id="columnsWrap">
        <article class="col walsh active visible" id="col-1" data-story="1">
          <div class="watermark wm-walsh" aria-hidden="true"></div>
          <div class="micro"><strong>WALSH</strong></div>
          <div class="big">responder con el propio cuerpo (y el propio sueldo)</div>
          
        </article>

        <article class="col pizarnik" id="col-2" data-story="2">
          <div class="watermark wm-pizarnik" aria-hidden="true"></div>
          <div class="micro"><strong>PIZARNIK</strong></div>
          <div class="big">políticas que llegan en un velorio</div>
          
        </article>

        <article class="col galeano" id="col-3" data-story="3">
          <div class="watermark wm-galeano" aria-hidden="true"></div>
          <div class="micro"><strong>GALEANO</strong></div>
          <div class="big">hacer ‘service’ de no-políticas</div>
          
        </article>
      </div>

      <div class="controls">
        <span><kbd>0</kbd> salir</span>
      </div>
    </section>

    <button class="next-btn" id="nextBtn" aria-label="Siguiente">→</button>

    <div class="story-modal" id="storyModal" aria-hidden="true">
      <div class="story-backdrop"></div>
      <div class="story-card" id="storyCard">
        <div class="story-head">
          <div>
            <div class="story-kicker" id="storyKicker"></div>
            <h2 class="story-title" id="storyTitle"></h2>
          </div>
          <button class="back-btn" id="backBtn">Volver</button>
        </div>
        <div class="story-main">
          <div class="story-text-wrap" id="storyTextWrap">
            <div class="story-body" id="storyBody"></div>
            <div class="story-cite" id="storyCite"></div>
          </div>
          <figure class="story-media" id="storyMedia">
            <img id="storyImage" alt="Documento del trabajo de campo">
            <figcaption id="storyCaption"></figcaption>
          </figure>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  const col1 = document.getElementById('col-1');
  const col2 = document.getElementById('col-2');
  const col3 = document.getElementById('col-3');
  const nextBtn = document.getElementById('nextBtn');
  const storyModal = document.getElementById('storyModal');
  const storyCard = document.getElementById('storyCard');
  const storyKicker = document.getElementById('storyKicker');
  const storyTitle = document.getElementById('storyTitle');
  const storyBody = document.getElementById('storyBody');
  const storyCite = document.getElementById('storyCite');
  const storyTextWrap = document.getElementById('storyTextWrap');
  const storyMedia = document.getElementById('storyMedia');
  const storyImage = document.getElementById('storyImage');
  const storyCaption = document.getElementById('storyCaption');
  const backBtn = document.getElementById('backBtn');

  let stage = 0;
  let modalOpen = false;

  const stories = {
    1: {
      school: 'Walsh',
      title: 'responder con el propio cuerpo (y el propio sueldo)',
      cls: 'walsh',
      body: '“Los otros días tuve una agarrada fuerte con una profesora porque me reclamaba que le pague. Le tuve que explicar que el programa nos lo hicieron hacer empezar sin tener habilitado el retiro de dinero. Recién cuando el mes terminó y ellos habían terminado de trabajar pude empezar a retirar dinero. Pero solo me deja sacar diez mil, quince mil —si tengo suerte— por día y siempre en el mismo cajero… el que está en la Ruta 8. Vino de malos modos a reclamarme que su plata se desvalorizaba, que necesitaba cobrar… Yo te entiendo, le dije, pero vamos juntas, vamos juntas, vení al cajero conmigo y comprobá que no te estoy mintiendo.\n\nAl final, para no tener más problemas, agarré plata de mi sueldo y le pagué. Porque el dinero que nos mandan está bloqueado para hacer transferencias, para extraer en otro cajero, es un lío… así que cuando puedo voy, saco y recupero… pero ahora pierdo yo. Ahora vino de nuevo el programa y el monto que se le paga a cada docente subió… ¿Sabés cuántos meses voy a necesitar para sacar todo el dinero y pagarles a todos?”',
      cite: '(Conversación con Susana, oficina de dirección, escuela Walsh, octubre de 2023).',
      image: 'rendicion_abril_22.png',
      caption: 'Trabajo de campo, escuela Pizarnik, Noviembre de 2022.'
    },
    2: {
      school: 'Pizarnik',
      title: 'políticas que llegan en un velorio',
      cls: 'pizarnik',
      body: '“El jueves estábamos en un velorio con otros directores de una docente muy querida. Mientras estábamos ahí, nos llegó que desde el lunes pasado estaba en vigencia el programa FORTE. O sea, una cosa de locos, ¿entendés? Teníamos que implementar en ese momento un programa que mandaron cuatro días después. Una situación terrible. Estábamos en el velorio todos con el teléfono tratando de resolver eso que de un día para otro nos había llegado. Acá siempre es igual… ¡todo es para ayer! Así que me tuve que ir antes del lugar y toda la semana estuve con esto del programa. Todo lo que tenía idea de hacer, no lo pude hacer”.',
      cite: '(Conversación con María A., oficina de dirección, escuela Pizarnik, agosto de 2023)',
      image: 'agenda_directora.png',
      caption: 'Trabajo de campo, julio de 2023, escuela Galeano.'
    },
    3: {
      school: 'Galeano',
      title: 'hacer ‘service’ de no-políticas',
      cls: 'galeano',
      body: '“Con los años aprendí a tener mi cajita de herramientas… ahí tengo de todo, en algún momento hasta tenía un taladro. [...] Entonces, pasa algo, se rompe algo, yo tengo ahí mi valijita para resolver problemas, cerraduras, ventanas, electricidad, lo que sea. Cuando son cosas menores, las arreglo yo, porque si pido al Consejo [Escolar] andá a saber cuándo viene. Acá terminas aprendiendo de todo. Todo lo tengo que resolver yo. Yo tendría que tener acá un EMATP [encargado de medios de apoyo]… Pero no. Como no se dignan a ponernos uno, ¿adiviná quién lo tiene que hacer?”',
      cite: '(Conversación con Morticia, oficina de dirección, escuela Galeano, septiembre de 2023)'
    }
  };

  function setActiveColumn(num){
    [col1, col2, col3].forEach((c, i) => c.classList.toggle('active', i === num - 1));
  }

  function showColumn(num){
    const col = document.getElementById(`col-${num}`);
    if (col && !col.classList.contains('visible')) col.classList.add('visible');
    setActiveColumn(num);
  }


  function fitStoryText(){
    // reset sizes
    let title = 48;
    let body = 38;
    let cite = 21;
    storyTitle.style.fontSize = title + 'px';
    storyBody.style.fontSize = body + 'px';
    storyCite.style.fontSize = cite + 'px';

    let safety = 0;
    while (storyCard.scrollHeight > storyCard.clientHeight && safety < 40){
      if (body > 21) body -= 1;
      if (title > 26) title -= 0.7;
      if (cite > 14) cite -= 0.45;
      storyTitle.style.fontSize = title + 'px';
      storyBody.style.fontSize = body + 'px';
      storyCite.style.fontSize = cite + 'px';
      safety += 1;
    }
  }

  function openStory(num){
    const data = stories[num];
    if (!data) return;
    modalOpen = true;
    storyModal.classList.add('open');
    storyModal.setAttribute('aria-hidden', 'false');
    storyCard.className = `story-card ${data.cls}`;
    storyKicker.textContent = data.school;
    storyTitle.textContent = data.title;
    storyBody.textContent = data.body;
    storyCite.textContent = data.cite;
    if(data.image){
      storyImage.src=data.image;
      storyCaption.textContent=data.caption||'';
      storyMedia.classList.add('visible');
    }else{
      storyMedia.classList.remove('visible');
      storyImage.removeAttribute('src');
      storyCaption.textContent='';
    }
    nextBtn.classList.add('hidden');
    requestAnimationFrame(() => { requestAnimationFrame(fitStoryText); });
  }

  function closeStory(){
    modalOpen = false;
    storyModal.classList.remove('open');
    storyModal.setAttribute('aria-hidden', 'true');
    nextBtn.classList.remove('hidden');
  }

  function advance(){
    if (modalOpen) return;
    if (stage === 0){
      openStory(1);
      stage = 1;
      return;
    }
    if (stage === 1){
      showColumn(2);
      stage = 2;
      return;
    }
    if (stage === 2){
      openStory(2);
      stage = 3;
      return;
    }
    if (stage === 3){
      showColumn(3);
      stage = 4;
      return;
    }
    if (stage === 4){
      openStory(3);
      stage = 5;
      return;
    }
    parent.postMessage({type:'gema05-narrative-next'}, '*');
  }

  function maybeReopenByClick(event){
    const target = event.currentTarget;
    const num = Number(target.dataset.story);
    if (!target.classList.contains('visible')) return;
    openStory(num);
  }

  async function toggleFullscreen(){
    try{
      if(!document.fullscreenElement) await document.documentElement.requestFullscreen();
      else await document.exitFullscreen();
    }catch(e){}
  }

  async function exitAll(){
    parent.postMessage({type:'gema05-narrative-exit'}, '*');
  }

  nextBtn.addEventListener('click', advance);
  backBtn.addEventListener('click', closeStory);
  col1.addEventListener('click', maybeReopenByClick);
  col2.addEventListener('click', maybeReopenByClick);
  col3.addEventListener('click', maybeReopenByClick);

  window.addEventListener('keydown', (event) => {
    const key = event.key;
    const k = key.toLowerCase();

    if (key === '0'){
      event.preventDefault();
      if (modalOpen){
        closeStory();
      } else {
        exitAll();
      }
      return;
    }

    if (k === 'f'){
      event.preventDefault();
      toggleFullscreen();
      return;
    }

    if (modalOpen && (key === 'Escape' || k === 'backspace')){
      event.preventDefault();
      closeStory();
      return;
    }

    if (modalOpen && (key === 'ArrowRight' || key === ' ' || key === 'PageDown')){
      event.preventDefault();
      closeStory();
      return;
    }

    if (!modalOpen && (key === 'ArrowRight' || key === ' ' || key === 'PageDown')){
      event.preventDefault();
      advance();
      return;
    }
  });
</script>
</body>
</html>
